<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Template Designer — ContractNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/coverage.css">
</head>
<body>

<div id="app" class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">\uD83D\uDCCB</div>
            <span class="brand-text">Global Designer</span>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-group">
                <span class="nav-label">DESIGNER</span>
                <button class="nav-item active" data-view="coverage" onclick="App.navigate('coverage')">
                    <span class="nav-icon">\uD83C\uDFAF</span>
                    <span>Coverage Dashboard</span>
                </button>
                <button class="nav-item" data-view="resources" onclick="App.navigate('resources')">
                    <span class="nav-icon">\uD83D\uDD27</span>
                    <span>Resource List</span>
                </button>
                <button class="nav-item" data-view="agent" onclick="App.navigate('agent')">
                    <span class="nav-icon">\uD83E\uDD16</span>
                    <span>AI Agent</span>
                    <span class="nav-badge">New</span>
                </button>
            </div>

            <div class="nav-group">
                <span class="nav-label">TEMPLATES</span>
                <button class="nav-item" data-view="gallery" onclick="App.navigate('gallery')">
                    <span class="nav-icon">\uD83D\uDDC2\uFE0F</span>
                    <span>Global Templates</span>
                </button>
                <button class="nav-item" data-view="analytics" onclick="App.navigate('analytics')">
                    <span class="nav-icon">\uD83D\uDCCA</span>
                    <span>Analytics</span>
                </button>
            </div>

            <div class="nav-group">
                <span class="nav-label">DATA</span>
                <button class="nav-item" data-view="industries" onclick="App.navigate('industries')">
                    <span class="nav-icon">\uD83C\uDFE2</span>
                    <span>Industries (15)</span>
                </button>
                <button class="nav-item" data-view="categories" onclick="App.navigate('categories')">
                    <span class="nav-icon">\uD83D\uDCC2</span>
                    <span>Categories (385)</span>
                </button>
                <button class="nav-item" data-view="resourceTypes" onclick="App.navigate('resourceTypes')">
                    <span class="nav-icon">\uD83D\uDC65</span>
                    <span>Resource Types (5)</span>
                </button>
            </div>
        </nav>

        <div class="sidebar-footer">
            <button class="theme-toggle" onclick="App.toggleTheme()" title="Toggle theme">
                <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            </button>
            <div class="sidebar-user">
                <div class="user-avatar">CK</div>
                <span class="user-name">Admin</span>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="view-title">Coverage Dashboard</h1>
                <span class="view-subtitle">Industry-wise template coverage analysis</span>
            </div>
            <div class="topbar-right">
                <button class="btn btn-secondary" onclick="Utils.toast('Refreshing coverage data...', 'success')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                    Refresh
                </button>
                <button class="btn btn-primary" onclick="Utils.toast('Batch generation coming in Phase 2', 'warning')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                    Generate All Gaps
                </button>
            </div>
        </header>

        <div class="view-container">
            <div id="coverageView" class="coverage-view"></div>
        </div>
    </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="js/utils.js"></script>
<script src="js/data.js"></script>
<script src="js/coverage.js"></script>
<script src="js/app.js"></script>

</body>
</html>
